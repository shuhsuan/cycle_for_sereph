<script>

function createCycle(column){

    const items = column.querySelectorAll("li")
    const button = column.querySelector(".cycle-btn")

    let index = 0

    function update(){
        items.forEach((item,i)=>{
            item.classList.toggle("active",i===index)
        })
    }

    function next(){
        const previousAbility = items[index].textContent

        index = (index+1)%items.length

        update()

        return previousAbility
    }

    button.addEventListener("click",()=>{

        const previousAbility = next()

        if(column.id==="dexter" && previousAbility==="Progress Inner cycle"){
            dexterInner.next()
        }

        if(column.id==="sinister" && previousAbility==="Progress Inner cycle"){
            sinisterInner.next()
        }

    })

    items.forEach((item,i)=>{
        item.addEventListener("click",()=>{
            index=i
            update()
        })
    })

    update()

    return {next}
}

const dexterInner = createCycle(document.getElementById("dexterInner"))
const sinisterInner = createCycle(document.getElementById("sinisterInner"))

createCycle(document.getElementById("dexter"))
createCycle(document.getElementById("sinister"))

document.querySelectorAll(".column").forEach(col=>{
    if(!col.id){
        createCycle(col)
    }
})

</script>
