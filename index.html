<script>

const cycles = {}

function createCycle(column){

    const items = column.querySelectorAll("li")
    const button = column.querySelector(".cycle-btn")

    let index = 0

    function update(){
        items.forEach((item,i)=>{
            item.classList.toggle("active",i===index)
        })
    }

    function next(){

        const previousAbility = items[index].textContent

        index = (index+1)%items.length

        update()

        return previousAbility
    }

    button.addEventListener("click",()=>{

        const previousAbility = next()

        if(column.id==="dexter" && previousAbility==="Progress Inner cycle"){
            cycles.dexterInner.next()
        }

        if(column.id==="sinister" && previousAbility==="Progress Inner cycle"){
            cycles.sinisterInner.next()
        }

    })

    items.forEach((item,i)=>{
        item.addEventListener("click",()=>{
            index=i
            update()
        })
    })

    update()

    return {next}
}

document.querySelectorAll(".column").forEach(column=>{
    cycles[column.id || Math.random()] = createCycle(column)
})

</script>
